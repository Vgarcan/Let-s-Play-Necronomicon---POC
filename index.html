<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Let’s Play Necronomicon, POC</title>
<style>
:root{--bg:#0b0f0d;--panel:#151b17;--gold:#e8d99a;--green:#7cff9c;--text:#f7f1dc;--muted:#c6bfa2}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at 50% 0,rgba(124,255,156,.18),transparent 35%),linear-gradient(180deg,#08100c,#0b0f0d);color:var(--text)}
.hero{min-height:100vh;display:grid;place-items:center;padding:24px}.card{width:min(100%,980px);border:1px solid rgba(232,217,154,.35);border-radius:28px;background:rgba(21,27,23,.86);box-shadow:0 30px 90px rgba(0,0,0,.55);overflow:hidden}.cover{width:100%;display:block;background:#050705}.content{padding:24px}h1{margin:0;color:var(--gold);font-size:clamp(32px,7vw,72px);line-height:.95}p{color:var(--muted);font-size:18px;line-height:1.5}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:22px}button{border:0;border-radius:14px;padding:14px 18px;background:var(--gold);color:#171006;font-weight:900;font-size:16px}button.secondary{background:#253229;color:var(--text);border:1px solid rgba(255,255,255,.14)}.table{margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.zone{min-height:130px;border:1px dashed rgba(232,217,154,.35);border-radius:18px;background:rgba(0,0,0,.22);padding:14px}.zone strong{display:block;color:var(--green);margin-bottom:8px}.pill{display:inline-block;margin:4px 4px 0 0;padding:7px 10px;border-radius:999px;background:rgba(232,217,154,.14);border:1px solid rgba(232,217,154,.22);font-size:13px}</style>
</head>
<body>
<main class="hero">
<section class="card">
<img class="cover" src="assets/lpn-cover.svg" alt="Portada de Let’s Play Necronomicon">
<div class="content">
<h1>Let’s Play Necronomicon</h1>
<p>POC de mesa digital para probar el juego de cartas, con baraja común, manos de jugadores, mesa, descarte, turnos y vida. Esta versión inicial deja el repositorio limpio y preparado para subir la mesa completa.</p>
<div class="actions"><button onclick="drawCard()">Robar carta</button><button class="secondary" onclick="resetTable()">Reiniciar prueba</button></div>
<div class="table">
<div class="zone"><strong>Baraja</strong><span id="deck">25 cartas</span></div>
<div class="zone"><strong>Mano</strong><div id="hand"></div></div>
<div class="zone"><strong>Mesa</strong><span class="pill">Zona común</span><span class="pill">Turnos</span><span class="pill">Vida</span></div>
<div class="zone"><strong>Descarte</strong><span id="discard">0 cartas</span></div>
</div>
</div>
</section>
</main>
<script>
let deck=25,discard=0,hand=[];const names=['Motosierra Hambrienta','Bloqueo Imposible','Evento Oscuro','Curación Rara','Especial del Libro'];
function render(){document.getElementById('deck').textContent=deck+' cartas';document.getElementById('discard').textContent=discard+' cartas';document.getElementById('hand').innerHTML=hand.map(c=>'<span class="pill">'+c+'</span>').join('')||'<span class="pill">Sin cartas</span>'}
function drawCard(){if(deck<=0)return;deck--;hand.push(names[Math.floor(Math.random()*names.length)]);render()}
function resetTable(){deck=25;discard=0;hand=[];render()}render();
</script>
</body>
</html>
